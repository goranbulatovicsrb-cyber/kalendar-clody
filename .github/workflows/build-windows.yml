name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtmultimedia'
          cache: false

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Create all.cpp
        shell: pwsh
        run: |
          $content = @"
          // PRAVOSLAVNI KALENDAR - Auto-generated build file
          "@
          Set-Content -Path "src/all.cpp" -Value $content -Encoding UTF8
          Add-Content -Path "src/all.cpp" -Value (Get-Content "src/orthodoxholidays.cpp" -Raw) -Encoding UTF8
          Add-Content -Path "src/all.cpp" -Value (Get-Content "src/eventmanager.cpp" -Raw) -Encoding UTF8
          Add-Content -Path "src/all.cpp" -Value (Get-Content "src/musicplayer.cpp" -Raw) -Encoding UTF8
          Add-Content -Path "src/all.cpp" -Value (Get-Content "src/calendarwidget.cpp" -Raw) -Encoding UTF8
          Add-Content -Path "src/all.cpp" -Value (Get-Content "src/mainwindow.cpp" -Raw) -Encoding UTF8
          Add-Content -Path "src/all.cpp" -Value (Get-Content "src/main.cpp" -Raw) -Encoding UTF8
          Write-Host "all.cpp created: $((Get-Item src/all.cpp).Length) bytes"

      - name: Configure
        run: cmake -B build -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "deploy"
          Copy-Item "build\PravoslavniKalendar.exe" "deploy\"
          $qtBin = "$env:Qt6_DIR\bin"
          & "$qtBin\windeployqt6.exe" --release --no-translations "deploy\PravoslavniKalendar.exe"

      - name: ZIP
        shell: pwsh
        run: Compress-Archive -Path "deploy\*" -DestinationPath "PravoslavniKalendar.zip"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: PravoslavniKalendar-Windows
          path: PravoslavniKalendar.zip
          retention-days: 30
