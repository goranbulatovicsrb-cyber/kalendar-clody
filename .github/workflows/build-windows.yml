name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtmultimedia'
          cache: false

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Create all.cpp from embedded source
        shell: python
        run: |
          import base64, os
          b64 = ""
          with open("src/all.cpp", "wb") as f:
              f.write(base64.b64decode(b64))
          print("all.cpp created:", os.path.getsize("src/all.cpp"), "bytes")

      - name: Configure
        run: cmake -B build -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "deploy"
          Copy-Item "build\PravoslavniKalendar.exe" "deploy\"
          $qtBin = "$env:Qt6_DIR\bin"
          & "$qtBin\windeployqt6.exe" --release --no-translations "deploy\PravoslavniKalendar.exe"

      - name: ZIP
        shell: pwsh
        run: Compress-Archive -Path "deploy\*" -DestinationPath "PravoslavniKalendar.zip"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: PravoslavniKalendar-Windows
          path: PravoslavniKalendar.zip
          retention-days: 30
