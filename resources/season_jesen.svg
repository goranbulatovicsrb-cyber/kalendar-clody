<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a1008"/>
      <stop offset="20%"  stop-color="#382014"/>
      <stop offset="40%"  stop-color="#603520"/>
      <stop offset="55%"  stop-color="#8c5522"/>
      <stop offset="65%"  stop-color="#4b2e0d"/>
      <stop offset="100%" stop-color="#271608"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="72%" cy="58%" r="50%">
      <stop offset="0%"   stop-color="#ff9818" stop-opacity="0.7"/>
      <stop offset="20%"  stop-color="#ff7010" stop-opacity="0.45"/>
      <stop offset="50%"  stop-color="#c04808" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#600000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sunDisc" cx="38%" cy="36%" r="52%">
      <stop offset="0%"   stop-color="#ffd888"/>
      <stop offset="50%"  stop-color="#ff9818"/>
      <stop offset="100%" stop-color="#e85008"/>
    </radialGradient>
    <linearGradient id="mist1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#b89060" stop-opacity="0"/>
      <stop offset="35%"  stop-color="#b89060" stop-opacity="0.18"/>
      <stop offset="65%"  stop-color="#a07840" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#906030" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3a2008"/>
      <stop offset="50%"  stop-color="#2a1606"/>
      <stop offset="100%" stop-color="#181005"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="treeBlur"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="softBlur"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="mistBlur"><feGaussianBlur stdDeviation="16"/></filter>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="800" fill="url(#skyGrad)"/>

  <!-- Setting sun glow (large, atmospheric) -->
  <circle cx="864" cy="466" r="440" fill="url(#sunGlow)" filter="url(#softBlur)"/>
  <!-- Sun disc -->
  <circle cx="864" cy="466" r="36" fill="url(#sunDisc)" opacity="0.9" filter="url(#glow)"/>

  <!-- Mist layers -->
  <rect x="0" y="340" width="1200" height="200" fill="url(#mist1)" filter="url(#mistBlur)"/>
  <rect x="0" y="400" width="1200" height="160" fill="url(#mist1)" opacity="0.6" filter="url(#mistBlur)"/>

  <!-- Background forest silhouettes (far, very dark) -->
