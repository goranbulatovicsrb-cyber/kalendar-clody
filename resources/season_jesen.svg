    <ellipse cx="252"  cy="684" rx="7" ry="4.5" transform="rotate(26 252 684)"  fill="#d87818"/>
    <ellipse cx="432"  cy="686" rx="6" ry="4"   transform="rotate(70 432 686)"  fill="#a81806"/>
    <ellipse cx="624"  cy="680" rx="7" ry="4.5" transform="rotate(38 624 680)"  fill="#d45010"/>
    <ellipse cx="816"  cy="688" rx="6" ry="4"   transform="rotate(60 816 688)"  fill="#bc2c0a"/>
